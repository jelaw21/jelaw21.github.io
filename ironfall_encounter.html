<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRONFALL — Encounter Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@300;400;600&display=swap');

  :root {
    --bg: #0D1B2A;
    --parchment: #F0F4F8;
    --parchment-dark: #DDE6F0;
    --ink: #1C2B3A;
    --ink-mid: #4A6070;
    --ink-light: #8A9CAA;
    --brown: #6B4423;
    --brown-light: #8B5A2B;
    --brown-dark: #4A2E14;
    --blue: #1E4D7B;
    --blue-light: #2A6098;
    --blue-pale: #A8C8E8;
    --border: #7B9BB8;
    --gold: #D4A96A;
    --red: #8B0000;
    --red-light: #C00000;
    --green: #2D6A2D;
    --green-light: #3D8B3D;
    --tray-bg: #091520;
    --card-shadow: 0 4px 12px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Source Sans 3', sans-serif;
    color: var(--ink);
    height: 100vh;
    max-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0D1B2A 0%, #1E4D7B 50%, #0D1B2A 100%);
    border-bottom: 2px solid var(--brown);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    z-index: 100;
  }

  header h1 {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 3px;
  }

  header h1 span { color: var(--blue-pale); }

  .header-divider { width: 1px; height: 28px; background: var(--border); opacity: 0.4; }

  .round-display {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 14px;
  }

  .round-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: var(--blue-pale);
    letter-spacing: 2px;
    opacity: 0.7;
  }

  .round-num {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    min-width: 28px;
    text-align: center;
  }

  .btn {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 6px 14px;
    border-radius: 3px;
    cursor: pointer;
    border: 1px solid;
    transition: all 0.15s;
  }

  .btn-primary { background: var(--brown); color: var(--gold); border-color: var(--brown-light); }
  .btn-primary:hover { background: var(--brown-light); }
  .btn-blue { background: var(--blue); color: var(--blue-pale); border-color: var(--blue-light); }
  .btn-blue:hover { background: var(--blue-light); }
  .btn-ghost { background: transparent; color: var(--blue-pale); border-color: var(--border); opacity: 0.6; }
  .btn-ghost:hover { opacity: 1; }
  .btn-red { background: var(--red); color: white; border-color: var(--red-light); }
  .btn-red:hover { background: var(--red-light); }
  .btn-sm { padding: 3px 8px; font-size: 10px; }

  .header-actions { margin-left: auto; display: flex; gap: 8px; }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 0;
    height: 0;
  }

  /* ── CANVAS ── */
  .canvas {
    flex: 1;
    overflow-y: scroll;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
    min-height: 0;
    height: 100%;
    align-content: flex-start;
  }

  .canvas-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0.3;
    pointer-events: none;
    gap: 12px;
  }

  .canvas-empty-icon { font-size: 48px; }

  .canvas-empty-text {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    color: var(--blue-pale);
    letter-spacing: 2px;
  }

  .canvas-empty-sub {
    font-family: 'Crimson Text', serif;
    font-size: 14px;
    color: var(--blue-pale);
    font-style: italic;
  }

  .drop-zone {
    min-height: 100px;
    border: 2px dashed rgba(123,155,184,0.3);
    border-radius: 4px;
    transition: all 0.2s;
  }

  .drop-zone.drag-over {
    border-color: var(--gold);
    background: rgba(212,169,106,0.05);
  }

  /* ── ENCOUNTER CARD ── */
  .encounter-card {
    background: var(--parchment);
    border: 2px solid var(--border);
    border-radius: 4px;
    box-shadow: var(--card-shadow);
    overflow: hidden;
    transition: all 0.2s;
    position: relative;
    flex-shrink: 0;
  }

  .encounter-card.dead {
    opacity: 0.4;
    filter: grayscale(0.6);
  }

  .encounter-card.critical {
    border-color: var(--red-light);
    box-shadow: 0 0 12px rgba(139,0,0,0.4);
    animation: pulse-red 2s infinite;
  }

  @keyframes pulse-red {
    0%, 100% { box-shadow: 0 0 12px rgba(139,0,0,0.4); }
    50% { box-shadow: 0 0 20px rgba(192,0,0,0.7); }
  }

  .card-top {
    background: linear-gradient(90deg, var(--brown-dark), var(--brown));
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: grab;
  }

  .card-top:active { cursor: grabbing; }

  .drag-handle {
    color: var(--gold);
    opacity: 0.5;
    font-size: 14px;
    cursor: grab;
  }

  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 1px;
    flex: 1;
  }

  .card-level {
    font-family: 'Crimson Text', serif;
    font-size: 12px;
    color: var(--gold);
    opacity: 0.7;
    font-style: italic;
  }

  .card-type {
    font-family: 'Crimson Text', serif;
    font-size: 11px;
    color: var(--gold);
    opacity: 0.5;
    font-style: italic;
  }

  .initiative-badge {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    background: rgba(0,0,0,0.3);
    color: var(--gold);
    border: 1px solid rgba(212,169,106,0.3);
    border-radius: 3px;
    padding: 2px 6px;
  }

  .card-remove {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.3);
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
    transition: color 0.15s;
  }

  .card-remove:hover { color: var(--red-light); }

  .card-body {
    padding: 10px 12px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  /* ── EXHAUST SECTION ── */
  .exhaust-section { flex: 1; }

  .exhaust-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .exhaust-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    font-weight: 600;
    color: var(--ink-mid);
    letter-spacing: 1px;
    text-transform: uppercase;
    width: 52px;
    flex-shrink: 0;
  }

  .exhaust-num {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 700;
    min-width: 36px;
    text-align: right;
    transition: color 0.3s;
  }

  .exhaust-bar-wrap {
    flex: 1;
    height: 12px;
    background: rgba(0,0,0,0.1);
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 2px;
    overflow: hidden;
  }

  .exhaust-bar-fill {
    height: 100%;
    border-radius: 1px;
    transition: width 0.3s ease, background 0.3s ease;
  }

  .exhaust-btns {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .exhaust-quick {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 6px;
    border-radius: 2px;
    cursor: pointer;
    border: 1px solid;
    transition: all 0.15s;
  }

  .exhaust-add { background: var(--green); color: white; border-color: var(--green-light); }
  .exhaust-add:hover { background: var(--green-light); }
  .exhaust-sub { background: var(--red); color: white; border-color: var(--red-light); }
  .exhaust-sub:hover { background: var(--red-light); }

  .custom-exhaust {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 4px;
  }

  .custom-input {
    width: 44px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    text-align: center;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 3px 4px;
    background: white;
    outline: none;
  }

  /* ── FATAL INJURIES ── */
  .fatal-section {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 110px;
  }

  .fatal-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    font-weight: 600;
    color: var(--red);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .fatal-box {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 6px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: var(--parchment-dark);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .fatal-box:hover { background: rgba(139,0,0,0.08); }
  .fatal-box.active { background: rgba(139,0,0,0.2); border-color: var(--red); }

  .fatal-dot {
    width: 10px;
    height: 10px;
    border: 2px solid var(--border);
    border-radius: 50%;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .fatal-box.active .fatal-dot { background: var(--red); border-color: var(--red); }

  .fatal-text {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 11px;
    color: var(--ink-mid);
  }

  /* ── CONDITIONS ON CARD ── */
  .conditions-section {
    padding: 0 12px 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
    min-height: 28px;
  }

  .cond-tag {
    display: flex;
    align-items: center;
    gap: 3px;
    background: rgba(30,77,123,0.15);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2px 8px 2px 6px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 11px;
    color: var(--blue);
    font-weight: 600;
  }

  .cond-tag.dot { background: rgba(139,60,20,0.12); color: var(--brown); border-color: var(--brown-light); }

  .cond-remove {
    background: transparent;
    border: none;
    color: var(--ink-light);
    cursor: pointer;
    font-size: 11px;
    padding: 0;
    line-height: 1;
    margin-left: 2px;
  }

  .cond-remove:hover { color: var(--red); }

  .add-cond-btn {
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 2px 8px;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.15s;
  }

  .add-cond-btn:hover { border-color: var(--blue); color: var(--blue); }

  /* ── CONDITION PICKER ── */
  .cond-picker {
    display: none;
    position: absolute;
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    padding: 8px;
    z-index: 1000;
    width: 260px;
    flex-wrap: wrap;
    gap: 4px;
  }

  .cond-picker.open { display: flex; }

  .cond-opt {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    color: var(--ink);
    background: var(--parchment-dark);
    transition: all 0.15s;
  }

  .cond-opt:hover { background: var(--blue); color: white; border-color: var(--blue); }

  /* ── TRAY ── */
  .tray {
    width: 280px;
    background: var(--tray-bg);
    border-left: 2px solid var(--brown);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .tray-header {
    background: linear-gradient(90deg, var(--brown-dark), var(--brown));
    padding: 12px 16px;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .tray-search {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(123,155,184,0.2);
    flex-shrink: 0;
  }

  .tray-search input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(123,155,184,0.3);
    border-radius: 3px;
    padding: 6px 10px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 12px;
    color: var(--blue-pale);
    outline: none;
  }

  .tray-search input::placeholder { color: rgba(168,200,232,0.3); }
  .tray-search input:focus { border-color: var(--gold); }

  .tray-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .tray-band {
    margin-bottom: 8px;
    border: 1px solid rgba(123,155,184,0.2);
    border-radius: 3px;
    overflow: hidden;
  }

  .tray-band-header {
    background: rgba(30,77,123,0.3);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }

  .tray-band-header:hover { background: rgba(30,77,123,0.5); }

  .tray-band-name {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 1px;
  }

  .tray-band-levels {
    font-family: 'Crimson Text', serif;
    font-size: 11px;
    color: var(--blue-pale);
    opacity: 0.6;
    font-style: italic;
  }

  .tray-band-chevron {
    color: var(--gold);
    opacity: 0.5;
    font-size: 12px;
    transition: transform 0.2s;
  }

  .tray-band.open .tray-band-chevron { transform: rotate(90deg); }

  .tray-monsters {
    display: none;
    flex-direction: column;
    gap: 1px;
    background: rgba(0,0,0,0.2);
  }

  .tray-band.open .tray-monsters { display: flex; }

  .tray-monster {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: rgba(15,30,45,0.8);
    cursor: grab;
    transition: background 0.15s;
    user-select: none;
  }

  .tray-monster:hover { background: rgba(30,77,123,0.3); }
  .tray-monster:active { cursor: grabbing; }

  .tray-monster-info { flex: 1; }

  .tray-monster-name {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 600;
    color: var(--blue-pale);
  }

  .tray-monster-sub {
    font-family: 'Crimson Text', serif;
    font-size: 11px;
    color: var(--ink-light);
    font-style: italic;
  }

  .tray-add-btn {
    background: var(--blue);
    color: var(--blue-pale);
    border: none;
    border-radius: 3px;
    width: 24px;
    height: 24px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }

  .tray-add-btn:hover { background: var(--blue-light); }

  .tray-add-all {
    width: 100%;
    margin-top: 1px;
    background: rgba(107,68,35,0.3);
    border: none;
    padding: 6px;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .tray-add-all:hover { background: rgba(107,68,35,0.6); }

  /* ── INITIATIVE LIST ── */
  .initiative-bar {
    background: rgba(0,0,0,0.4);
    border-bottom: 1px solid rgba(123,155,184,0.2);
    padding: 6px 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    overflow-x: auto;
    flex-shrink: 0;
    min-height: 38px;
  }

  .init-label {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    font-weight: 700;
    color: var(--blue-pale);
    opacity: 0.5;
    letter-spacing: 2px;
    white-space: nowrap;
    margin-right: 4px;
  }

  .init-chip {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
    white-space: nowrap;
    color: var(--blue-pale);
    background: rgba(30,77,123,0.2);
    cursor: pointer;
    transition: all 0.15s;
  }

  .init-chip:hover { background: rgba(30,77,123,0.5); }
  .init-chip.current { background: var(--gold); color: var(--brown-dark); border-color: var(--gold); }
  .init-chip.dead { opacity: 0.3; text-decoration: line-through; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
  ::-webkit-scrollbar-thumb { background: rgba(123,155,184,0.3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(123,155,184,0.5); }

  /* ── ALL DEAD ── */
  .encounter-end {
    text-align: center;
    padding: 20px;
    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 2px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--gold);
    border-radius: 4px;
    display: none;
  }
</style>
</head>
<body>

<header>
  <h1>IRON<span>FALL</span></h1>
  <div class="header-divider"></div>
  <div class="round-display">
    <div class="round-label">ROUND</div>
    <div class="round-num" id="roundNum">1</div>
    <button class="btn btn-primary btn-sm" onclick="nextRound()">Next →</button>
  </div>
  <div class="header-divider"></div>
  <div id="encounterStatus" style="font-family:Crimson Text,serif;font-size:13px;color:var(--blue-pale);opacity:0.6;font-style:italic">
    Drag monsters from the tray to begin
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost btn-sm" onclick="sortByInitiative()">Sort Initiative</button>
    <button class="btn btn-red btn-sm" onclick="clearEncounter()">Clear Encounter</button>
  </div>
</header>

<!-- INITIATIVE BAR -->
<div class="initiative-bar" id="initiativeBar">
  <div class="init-label">INITIATIVE</div>
  <div style="font-family:Crimson Text,serif;font-size:12px;color:var(--blue-pale);opacity:0.3;font-style:italic">Add monsters to see initiative order</div>
</div>

<div class="layout">
  <!-- CANVAS -->
  <div class="canvas" id="canvas"
    ondragover="event.preventDefault();document.getElementById('canvas').classList.add('drag-over')"
    ondragleave="document.getElementById('canvas').classList.remove('drag-over')"
    ondrop="handleCanvasDrop(event)">
    <div class="canvas-empty" id="canvasEmpty">
      <div class="canvas-empty-icon">⚔</div>
      <div class="canvas-empty-text">ENCOUNTER CANVAS</div>
      <div class="canvas-empty-sub">Drag monsters from the tray on the right</div>
    </div>
    <div class="encounter-end" id="encounterEnd">⚔ ALL ENEMIES DEFEATED ⚔</div>
  </div>

  <!-- TRAY -->
  <div class="tray">
    <div class="tray-header">Monster Tray</div>
    <div class="tray-search">
      <input type="text" placeholder="Search monsters..." oninput="filterTray(this.value)" id="traySearch">
    </div>
    <div class="tray-list" id="trayList"></div>
  </div>
</div>

<!-- CONDITION PICKER (global overlay) -->
<div class="cond-picker" id="condPicker"></div>

<script>
// ── MONSTER DATA ──────────────────────────────────────────────────────────

const BANDS = [
  {
    name: 'The Goblin Band', levels: 'L1–2',
    monsters: [
      { name: 'Goblin Skirmisher', movement: '35ft', level: 'Level 1', type: 'Small Humanoid', initiative: 8, armor: 2, expertise: 2, willpower: 0, isBoss: false,
        abilities: ['Blade Edge','Pack Tactics'] },
      { name: 'Goblin Bruiser', movement: '25ft', level: 'Level 2', type: 'Small Humanoid', initiative: 8, armor: 5, expertise: 4, willpower: 0, isBoss: false,

// ── STATE ─────────────────────────────────────────────────────────────────

let encounter = [];
let round = 1;
let currentInitIdx = 0;
let activeMonsterId = null;
let dragData = null;
let idCounter = 1;

function makeInstance(monster) {
  return {
    id: idCounter++,
    ...JSON.parse(JSON.stringify(monster)),
    exhaust: 0,
    fatalInjuries: monster.isBoss ? [false, false, false] : [false],
    conditions: [],
    dead: false,
  };
}

// ── TRAY ─────────────────────────────────────────────────────────────────

function renderTray(filter = '') {
  const list = document.getElementById('trayList');
  const q = filter.toLowerCase();

  list.innerHTML = BANDS.map((band, bi) => {
    const filtered = band.monsters.filter(m => !q || m.name.toLowerCase().includes(q) || band.name.toLowerCase().includes(q));
    if (!filtered.length) return '';

    return `
      <div class="tray-band ${!q ? 'open' : 'open'}" id="band-${bi}">
        <div class="tray-band-header" onclick="toggleBand(${bi})">
          <div>
            <div class="tray-band-name">${band.name}</div>
            <div class="tray-band-levels">${band.levels}</div>
          </div>
          <div class="tray-band-chevron">▶</div>
        </div>
        <div class="tray-monsters">
          ${filtered.map((m, mi) => `
            <div class="tray-monster" draggable="true"
              ondragstart="startDrag(event, ${bi}, ${band.monsters.indexOf(m)})">
              <div class="tray-monster-info">
                <div class="tray-monster-name">${m.name}${m.isBoss ? ' ★' : ''}</div>
                <div class="tray-monster-sub">${m.level} · Init ${m.initiative} · Armor ${m.armor}</div>
              </div>
              <button class="tray-add-btn" onclick="addToEncounter(${bi}, ${band.monsters.indexOf(m)})">+</button>
            </div>
          `).join('')}
          <button class="tray-add-all" onclick="addBandToEncounter(${bi})">+ Add Entire Band</button>
        </div>
      </div>
    `;
  }).join('');
}

function toggleBand(bi) {
  const el = document.getElementById(`band-${bi}`);
  if (el) el.classList.toggle('open');
}

function filterTray(q) {
  renderTray(q);
}

function startDrag(event, bandIdx, monsterIdx) {
  dragData = { bandIdx, monsterIdx };
  event.dataTransfer.effectAllowed = 'copy';
}

function handleCanvasDrop(event) {
  event.preventDefault();
  document.getElementById('canvas').classList.remove('drag-over');
  if (dragData) {
    addToEncounter(dragData.bandIdx, dragData.monsterIdx);
    dragData = null;
  }
}

function addToEncounter(bandIdx, monsterIdx) {
  const monster = BANDS[bandIdx].monsters[monsterIdx];
  encounter.push(makeInstance(monster));
  renderEncounter();
}

function addBandToEncounter(bandIdx) {
  BANDS[bandIdx].monsters.forEach((m, mi) => addToEncounter(bandIdx, mi));
}

// ── ENCOUNTER RENDER ─────────────────────────────────────────────────────

function renderEncounter() {
  const canvas = document.getElementById('canvas');
  const empty = document.getElementById('canvasEmpty');
  const end = document.getElementById('encounterEnd');
  const status = document.getElementById('encounterStatus');

  empty.style.display = encounter.length ? 'none' : 'flex';

  const allDead = encounter.length > 0 && encounter.every(m => m.dead);
  end.style.display = allDead ? 'block' : 'none';

  status.textContent = encounter.length
    ? `${encounter.filter(m=>!m.dead).length} active · ${encounter.filter(m=>m.dead).length} defeated`
    : 'Drag monsters from the tray to begin';

  // Remove old cards
  canvas.querySelectorAll('.encounter-card').forEach(el => el.remove());

  encounter.forEach(m => {
    const card = buildCard(m);
    canvas.insertBefore(card, end);
  });

  renderInitiativeBar();
}

          <div class="exhaust-num" style="color:${exhaustColor}">${exhaust}</div>
          <div class="exhaust-bar-wrap">
            <div class="exhaust-bar-fill" style="width:${pct}%;background:${exhaustColor}"></div>
          </div>
          <div style="font-family:Cinzel,serif;font-size:10px;color:var(--ink-mid);opacity:0.6">/100</div>
        </div>
        ${exhaust >= 100 ? '<div style="font-family:Cinzel,serif;font-size:10px;color:var(--red);font-weight:700;letter-spacing:1px;margin-bottom:4px">⚔ ALL HITS ARE FATAL BLOWS</div>' : ''}
        <div class="exhaust-btns">
          ${[1,2,5,10].map(n=>`<button class="exhaust-quick exhaust-add" onclick="changeExhaust(${m.id},${n})">+${n}</button>`).join('')}
          ${[1,5,10].map(n=>`<button class="exhaust-quick exhaust-sub" onclick="changeExhaust(${m.id},-${n})">-${n}</button>`).join('')}
        </div>
        <div class="custom-exhaust">
          <input class="custom-input" type="number" id="custom-${m.id}" value="5" min="1" max="100">
          <button class="exhaust-quick exhaust-add btn-sm" onclick="changeExhaust(${m.id},+document.getElementById('custom-${m.id}').value)">+</button>
          <button class="exhaust-quick exhaust-sub btn-sm" onclick="changeExhaust(${m.id},-document.getElementById('custom-${m.id}').value)">-</button>
          <button class="exhaust-quick btn-sm" style="background:#555;color:white;border-color:#333" onclick="setExhaust(${m.id},0)">Reset</button>
        </div>
      </div>

      <div class="fatal-section">
        <div class="fatal-label">Fatal Injuries</div>
        ${m.isBoss ?
          m.fatalInjuries.map((fi, i) => `
            <div class="fatal-box ${fi?'active':''}" onclick="toggleFatal(${m.id},${i})">
              <div class="fatal-dot"></div>
              <div class="fatal-text">Injury ${i+1}${i===2?' — Death':''}</div>
            </div>
          `).join('') :
          `<div class="fatal-box ${m.fatalInjuries[0]?'active':''}" onclick="toggleFatal(${m.id},0)">
              <div class="fatal-dot"></div>
              <div class="fatal-text">Fatal Injury — Death</div>
            </div>`
        }
      </div>
    </div>

    <div class="conditions-section" id="conds-${m.id}">
      ${m.conditions.map(c => `
        <div class="cond-tag ${CONDITIONS_HAVE_VAL.includes(c.name)?'dot':''}">
          ${c.name}${c.val?' '+c.val:''}
          <button class="cond-remove" onclick="removeCondition(${m.id},'${c.name}')">✕</button>
        </div>
      `).join('')}
      <button class="add-cond-btn" onclick="openCondPicker(event,${m.id})">+ Condition</button>
    </div>
  `;

  return card;
}

function renderInitiativeBar() {
  const bar = document.getElementById('initiativeBar');
  if (!encounter.length) {
    bar.innerHTML = '<div class="init-label">INITIATIVE</div><div style="font-family:Crimson Text,serif;font-size:12px;color:var(--blue-pale);opacity:0.3;font-style:italic">Add monsters to see initiative order</div>';
    return;
  }

  const sorted = [...encounter].sort((a,b) => b.initiative - a.initiative);
  bar.innerHTML = '<div class="init-label">INITIATIVE ORDER</div>' +
    sorted.map((m, i) => `
      <div class="init-chip ${m.dead?'dead':''} ${i===currentInitIdx%sorted.length&&!m.dead?'current':''}"
        onclick="scrollToCard(${m.id})">
        ${m.initiative} · ${m.name.split(' ').pop()}
      </div>
    `).join('') +
    '<div style="margin-left:8px;font-family:Cinzel,serif;font-size:10px;color:var(--blue-pale);opacity:0.3;letter-spacing:1px">↑ HIGHEST GOES FIRST</div>';
}

// ── ACTIONS ──────────────────────────────────────────────────────────────

function changeExhaust(id, delta) {
  const m = encounter.find(m => m.id === id);
  if (!m) return;
  m.exhaust = Math.max(0, Math.min(100, m.exhaust + parseInt(delta)));
  renderEncounter();
}

function setExhaust(id, val) {
  const m = encounter.find(m => m.id === id);
  if (!m) return;
  m.exhaust = val;
  renderEncounter();
}

function toggleFatal(id, idx) {
  const m = encounter.find(m => m.id === id);
  if (!m) return;
  m.fatalInjuries[idx] = !m.fatalInjuries[idx];
  if (m.isBoss) {
    m.dead = m.fatalInjuries[2] === true;
  } else {
    m.dead = m.fatalInjuries[0] === true;
  }
  renderEncounter();
}

function removeFromEncounter(id) {
  encounter = encounter.filter(m => m.id !== id);
  renderEncounter();
}

function clearEncounter() {
  if (encounter.length && !confirm('Clear the encounter?')) return;
  encounter = [];
  round = 1;
  currentInitIdx = 0;
  document.getElementById('roundNum').textContent = '1';
  renderEncounter();
}

function nextRound() {
  round++;
  document.getElementById('roundNum').textContent = round;
  // Tick DoT conditions
  let dotMessages = [];
  encounter.forEach(m => {
    if (m.dead) return;
    m.conditions.forEach(c => {
      if (CONDITIONS_HAVE_VAL.includes(c.name) && c.val) {
        const dot = parseInt(c.val) || 0;
        if (['Bleed','Burn','Poison','Frostbite','Wither'].includes(c.name) && dot > 0) {
          m.exhaust = Math.min(100, m.exhaust + dot);
          dotMessages.push(`${m.name} takes ${dot} Exhaust from ${c.name}`);
        }
      }
    });
  });
  currentInitIdx++;
  renderEncounter();
  if (dotMessages.length) {
    setTimeout(() => alert('DoT Tick:\n' + dotMessages.join('\n')), 100);
  }
}

function sortByInitiative() {
  encounter.sort((a,b) => b.initiative - a.initiative);
  renderEncounter();
}

function scrollToCard(id) {
  const el = document.getElementById(`card-${id}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ── CONDITIONS ────────────────────────────────────────────────────────────

function openCondPicker(event, monsterId) {
  event.stopPropagation();
  activeMonsterId = monsterId;
  const picker = document.getElementById('condPicker');
  picker.classList.add('open');
  const rect = event.target.getBoundingClientRect();
  picker.style.top = (rect.bottom + 4) + 'px';
  picker.style.left = rect.left + 'px';
}

function addCondition(id, name) {
  const m = encounter.find(m => m.id === id);
  if (!m) return;
  const hasVal = CONDITIONS_HAVE_VAL.includes(name);
  let val = '';
  if (hasVal) {
    val = prompt(`${name} value (e.g. 2 for ${name} 2):`, '2') || '';
  }
  if (!m.conditions.find(c => c.name === name)) {
    m.conditions.push({ name, val });
  }
  document.getElementById('condPicker').classList.remove('open');
  activeMonsterId = null;
  renderEncounter();
}

function removeCondition(id, name) {
  const m = encounter.find(m => m.id === id);
  if (!m) return;
  m.conditions = m.conditions.filter(c => c.name !== name);
  renderEncounter();
}

document.addEventListener('click', e => {
  const picker = document.getElementById('condPicker');
  if (!e.target.closest('#condPicker') && !e.target.closest('.add-cond-btn')) {
    picker.classList.remove('open');
    activeMonsterId = null;
  }
});

// ── ABILITY TOGGLE ───────────────────────────────────────────────────────
// Track active abilities per monster
const activeAbilities = {};

function toggleAbilityDesc(el, abilityName, monsterId) {
  const desc = ABILITY_DESCRIPTIONS[abilityName] || 'No description available.';
  const descBox = document.getElementById('ability-desc-' + monsterId);

  if (!activeAbilities[monsterId]) activeAbilities[monsterId] = {};

  if (activeAbilities[monsterId][abilityName]) {
    // Deactivate
    delete activeAbilities[monsterId][abilityName];
    el.style.background = 'rgba(30,77,123,0.08)';
    el.style.color = 'var(--blue)';
    el.style.borderColor = 'rgba(30,77,123,0.2)';
  } else {
    // Activate
    activeAbilities[monsterId][abilityName] = desc;
    el.style.background = 'rgba(107,68,35,0.2)';
    el.style.color = 'var(--brown)';
    el.style.borderColor = 'var(--brown-light)';
  }

  // Rebuild description box with all active abilities
  const active = activeAbilities[monsterId];
  const keys = Object.keys(active);
  if (keys.length === 0) {
    descBox.style.display = 'none';
  } else {
    descBox.style.display = 'block';
    descBox.innerHTML = keys.map(k =>
      '<div style="padding:3px 0;border-bottom:1px dotted rgba(0,0,0,0.1);line-height:1.4">' +
      '<strong style="font-style:normal;color:var(--brown)">' + k + ':</strong> ' + active[k] +
      '</div>'
    ).join('');
  }
}

// ── BUILD CONDITION PICKER ───────────────────────────────────────────────
function buildCondPicker() {
  const picker = document.getElementById('condPicker');
  const conds = ['Bleed','Burn','Poison','Frostbite','Wither','Stagger','Stun','Root','Slow','Cripple','Sunder','Weaken','Silence','Prone','Restrained','Curse','Blind'];
  picker.innerHTML = conds.map(c =>
    '<div class="cond-opt" onclick="addCondition(activeMonsterId,\'' + c + '\')">' + c + '</div>'
  ).join('');
}

// ── INIT ─────────────────────────────────────────────────────────────────
buildCondPicker();
renderTray();
renderEncounter();
</script>
</body>
</html>
